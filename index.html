<script>
  const CONFIG = {
    user: "celtmen-cpu",
    repo: "Spy-game-",
    webhooks: {
      win: "https://discord.com/api/webhooks/...",
      lin: "https://discord.com/api/webhooks/..."
    },
    releaseName: "0.3" // ← METS ICI LE NOM DE LA RELEASE QUE TU VEUX
  };

  let counts = { win: 0, lin: 0 };

  async function init() {
    try {
      const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/releases`);
      const releases = await res.json();
      document.getElementById('loader').style.display = 'none';
      const grid = document.getElementById('downloadGrid');
      
      let assetsFound = { win: null, lin: null };

      releases.forEach(rel => {
        rel.assets.forEach(asset => {
          const name = asset.name.toLowerCase();
          const target = CONFIG.releaseName.toLowerCase();

          if (name.includes('windows') && name.includes(target)) {
            assetsFound.win = asset;
            counts.win = asset.download_count;
          }
          if (name.includes('linux') && name.includes(target)) {
            assetsFound.lin = asset;
            counts.lin = asset.download_count;
          }
        });
      });

      ['win', 'lin'].forEach(key => {
        if (assetsFound[key]) {
          const data = assetsFound[key];
          const title = key === 'win' ? 'Version Windows' : 'Version Linux';
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div>
              <div class="os-name">${title}</div>
              <div class="file-info">${data.name}</div>
            </div>
            <a href="${data.browser_download_url}" class="btn" onclick="track('${key}')">Télécharger</a>
          `;
          grid.appendChild(card);
        }
      });

      if (!assetsFound.win && !assetsFound.lin) {
        document.getElementById('loader').innerText = "Les fichiers arrivent bientôt !";
      }

    } catch (e) {
      document.getElementById('loader').innerText = "Connexion aux serveurs momentanément indisponible.";
    }
  }

  function track(key) {
    const total = counts[key] + 1;
    const url = key === 'win' ? CONFIG.webhooks.win : CONFIG.webhooks.lin;
    const label = key === 'win' ? 'WINDOWS' : 'LINUX';

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        embeds: [{
          title: `🎮 Nouveau joueur sur ${label}`,
          fields: [{ name: "Total des téléchargements", value: `✨ ${total}`, inline: true }],
          color: 3066993,
          timestamp: new Date()
        }]
      })
    });
  }

  document.getElementById('feedbackForm').onsubmit = async (e) => {
    e.preventDefault();
    const v = document.getElementById('ver').value;
    const m = document.getElementById('msg').value;
    await fetch(CONFIG.webhooks.win, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        embeds: [{
          title: "📣 Nouveau retour joueur",
          fields: [{name: "Version", value: v, inline: true}, {name: "Feedback", value: m}],
          color: 15844367, timestamp: new Date()
        }]
      })
    });
    alert("Génial, merci pour votre retour !");
    e.target.reset();
  };

  init();
</script>
