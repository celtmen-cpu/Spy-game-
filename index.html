<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spy Game - Téléchargements</title>
  <link rel="icon" href="https://images.icon-icons.com/4029/PNG/512/twitter_x_new_logo_x_rounded_icon_256078.png" type="image/png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #2c3e50; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    h1 { text-align: center; margin: 20px 0; font-size: 2.2em; color: #2c3e50; text-transform: uppercase; letter-spacing: 2px; }
    h2 { width: 100%; max-width: 800px; font-size: 1.4em; color: #34495e; margin: 30px 0 15px; border-bottom: 2px solid #2980b9; padding-bottom: 8px; }
    p { margin-bottom: 20px; text-align: center; max-width: 600px; }
    
    #downloadList { list-style: none; width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
    li { background: white; border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex-wrap: wrap; gap: 15px; }
    
    .game-info { flex: 1; display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1.1em; }
    .platform-tag { font-size: 0.7em; background: #34495e; color: white; padding: 3px 10px; border-radius: 20px; }
    
    .btn { padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1em; transition: 0.3s; text-align: center; background: #2980b9; color: #fff; border: none; cursor: pointer; min-width: 150px; }
    .btn:hover { background: #1abc9c; transform: scale(1.05); }

    #reviewForm { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    #reviewForm input, #reviewForm textarea { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
    #reviewForm button { padding: 12px; border-radius: 8px; border: none; background: #2c3e50; color: white; font-weight: bold; cursor: pointer; }

    @media (max-width: 600px) { li { flex-direction: column; text-align: center; } .btn { width: 100%; } }
  </style>
</head>
<body>

  <h1>Spy Game</h1>
  <p>Téléchargements officiels sécurisés via GitHub.</p>

  <h2>Plateformes</h2>
  <ul id="downloadList">
    </ul>

  <h2>Laisser un avis</h2>
  <form id="reviewForm">
    <input type="text" id="userName" placeholder="Votre nom" required>
    <textarea id="userMessage" rows="4" placeholder="Votre message..." required></textarea>
    <button type="submit">Envoyer l'avis</button>
  </form>

  <script>
    const GITHUB_USER = "celtmen-cpu";
    const GITHUB_REPO = "Spy-game-";
    
    // Webhooks distincts
    const WEBHOOK_WINDOWS = "https://discord.com/api/webhooks/1484975628146184243/auZz9JbjNXfJU7wKMpRBwp5XbuPo0EzZkmnyCWGhEMOH7moKZL2pzV4idMlb2N63CtRp";
    const WEBHOOK_LINUX = "https://discord.com/api/webhooks/1484976674318586188/fQVJ8dY89xbSnyTZgroufuI9-k8hXz-JU0CLRcU2SvqDH3RHYXfOUzRp8EVyTtX7GaNj";

    const files = [
      { 
        name: "Windows", 
        file: "SpyGame-Windows.zip", 
        label: "PC (.zip)", 
        webhook: WEBHOOK_WINDOWS 
      },
      { 
        name: "Linux", 
        file: "SpyGame-Linux.zip", 
        label: "Linux (.zip)", 
        webhook: WEBHOOK_LINUX 
      }
    ];

    async function notifyDiscord(webhookUrl, platform) {
      const data = {
        embeds: [{
          title: "📥 Nouveau téléchargement !",
          description: `Un utilisateur a lancé le téléchargement de la version **${platform}**.`,
          color: platform === "Windows" ? 3447003 : 15105570, // Bleu pour Win, Orange pour Linux
          timestamp: new Date()
        }]
      };

      try {
        await fetch(webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } catch (e) { console.error("Erreur Webhook", e); }
    }

    // Affichage des boutons
    const list = document.getElementById('downloadList');
    files.forEach(f => {
      const url = `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/releases/latest/download/${f.file}`;
      const li = document.createElement('li');
      li.innerHTML = `
        <div class="game-info">${f.name} <span class="platform-tag">${f.label}</span></div>
        <a href="${url}" class="btn" onclick="notifyDiscord('${f.webhook}', '${f.name}')">Télécharger</a>
      `;
      list.appendChild(li);
    });

    // Envoi des avis sur le webhook Windows (par défaut)
    document.getElementById('reviewForm').onsubmit = async (e) => {
      e.preventDefault();
      const name = document.getElementById('userName').value;
      const msg = document.getElementById('userMessage').value;

      const reviewData = {
        embeds: [{
          title: "💬 Nouvel Avis Client",
          fields: [
            { name: "Joueur", value: name, inline: true },
            { name: "Message", value: msg }
          ],
          color: 3066993
        }]
      };

      await fetch(WEBHOOK_WINDOWS, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(reviewData)});
      alert("Merci ! Ton avis a été envoyé.");
      e.target.reset();
    };
  </script>
</body>
</html>
