<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spy Game - Téléchargements</title>
  <style>
    :root {
      --primary: #1e293b;
      --accent: #2563eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #334155;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; 
      background-color: var(--bg); 
      color: var(--text); 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      padding: 60px 20px;
    }

    .container { width: 100%; max-width: 800px; }

    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    h2 { font-size: 0.9rem; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }

    .download-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    
    .card {
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .os-name { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
    .file-info { font-size: 0.85rem; color: #64748b; margin-bottom: 15px; }

    .btn {
      display: block; text-align: center;
      padding: 10px; background: var(--primary); color: white;
      text-decoration: none; font-weight: 600; font-size: 0.9rem;
      border-radius: 4px; transition: background 0.2s;
    }
    .btn:hover { background: #000; }

    form { display: flex; flex-direction: column; gap: 12px; }
    input, textarea {
      padding: 12px; border: 1px solid var(--border); border-radius: 4px;
      font-family: inherit; font-size: 0.95rem; width: 100%;
    }
    .btn-submit { background: var(--accent); color: white; font-weight: 700; padding: 12px; border: none; cursor: pointer; border-radius: 4px; }

    @media (max-width: 600px) { .download-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Spy Game</h1>
    </header>

    <div class="section">
      <h2>Versions disponibles</h2>
      <div id="loader" style="text-align:center; font-size:0.9rem; color:#94a3b8;">Chargement des fichiers...</div>
      <div id="downloadGrid" class="download-grid"></div>
    </div>

    <div class="section">
      <h2>Rapport de test</h2>
      <form id="feedbackForm">
        <input type="text" id="ver" placeholder="Version testée" required>
        <textarea id="msg" rows="4" placeholder="Votre message ou rapport de bug..." required></textarea>
        <button type="submit" class="btn-submit">Envoyer le rapport</button>
      </form>
    </div>
  </div>

  <script>
    const CONFIG = {
      user: "celtmen-cpu",
      repo: "Spy-game-",
      targets: { win: "windows_v0.2.zip", lin: "Linux_v0.2.zip" },
      webhooks: {
        win: "https://discord.com/api/webhooks/1484975628146184243/auZz9JbjNXfJU7wKMpRBwp5XbuPo0EzZkmnyCWGhEMOH7moKZL2pzV4idMlb2N63CtRp",
        lin: "https://discord.com/api/webhooks/1484976674318586188/fQVJ8dY89xbSnyTZgroufuI9-k8hXz-JU0CLRcU2SvqDH3RHYXfOUzRp8EVyTtX7GaNj"
      }
    };

    let downloadStats = { win: 0, lin: 0 };

    async function loadReleases() {
      try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/releases`);
        const releases = await response.json();
        document.getElementById('loader').style.display = 'none';
        const grid = document.getElementById('downloadGrid');
        
        let found = { win: null, lin: null };
        releases.forEach(rel => {
          rel.assets.forEach(asset => {
            if (asset.name === CONFIG.targets.win) {
                found.win = asset;
                downloadStats.win = asset.download_count;
            }
            if (asset.name === CONFIG.targets.lin) {
                found.lin = asset;
                downloadStats.lin = asset.download_count;
            }
          });
        });

        Object.keys(found).forEach(key => {
          if (found[key]) {
            const asset = found[key];
            const name = key === 'win' ? 'Version Windows' : 'Version Linux';
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
              <div>
                <div class="os-name">${name}</div>
                <div class="file-info">Fichier : ${asset.name}</div>
              </div>
              <a href="${asset.browser_download_url}" class="btn" onclick="handleDownload('${key}')">Télécharger</a>
            `;
            grid.appendChild(card);
          }
        });
      } catch (err) {
        document.getElementById('loader').innerText = "Erreur lors du chargement.";
      }
    }

    function handleDownload(key) {
      // On calcule le nombre de téléchargements + 1
      const currentTotal = downloadStats[key];
      const newTotal = currentTotal + 1;
      
      const url = key === 'win' ? CONFIG.webhooks.win : CONFIG.webhooks.lin;
      const osName = key === 'win' ? 'Windows' : 'Linux';

      // Envoi sur Discord uniquement
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          embeds: [{
            title: `📥 Nouveau téléchargement : ${osName}`,
            fields: [
              { name: "Nombre de téléchargements", value: `📊 ${newTotal}`, inline: true }
            ],
            color: 3447003,
            timestamp: new Date()
          }]
        })
      });
    }

    document.getElementById('feedbackForm').onsubmit = async (e) => {
      e.preventDefault();
      const v = document.getElementById('ver').value;
      const m = document.getElementById('msg').value;
      await fetch(CONFIG.webhooks.win, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          embeds: [{
            title: "📋 Rapport de test",
            fields: [{name: "Version", value: v, inline: true}, {name: "Message", value: m}],
            color: 3447003, timestamp: new Date()
          }]
        })
      });
      alert("Merci, le rapport a été envoyé.");
      e.target.reset();
    };

    loadReleases();
  </script>
</body>
</html>
